name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release --target ${{ matrix.target }} -p dmux

      - name: Build release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --target ${{ matrix.target }} -p dmux

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset="dmux-${{ matrix.target }}.tar.gz"
          tar -czf "${asset}" -C "target/${{ matrix.target }}/release" dmux
          shasum -a 256 "${asset}" > "${asset}.sha256sum"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "dmux-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/dmux.exe" -DestinationPath $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256sum"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dmux-${{ matrix.target }}.${{ matrix.archive_ext }}
            dmux-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256sum
          fail_on_unmatched_files: true
